<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="云桥 CloudBridge - 通过手机连接远程设备">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="云桥">
  <meta name="theme-color" content="#2563EB">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>云桥 CloudBridge</title>
  <link rel="manifest" href="manifest.json">

  <!-- Auto-detect CloudBridge server config from current host -->
  <script>
    // The webproxy serves this file and the API on the same host.
    // If CLOUDBRIDGE_CONFIG is not set (direct file access), auto-detect from location.
    if (typeof window.CLOUDBRIDGE_CONFIG === 'undefined') {
      var host = window.location.hostname;
      var wsProto = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
      var httpProto = (window.location.protocol === 'https:') ? 'https:' : 'http:';
      var port = window.location.port;
      var signalPort = port || '10980';
      // If served by webproxy (port 10990), signal is on same host port 10980
      if (port === '10990' || port === '') {
        signalPort = '10980';
      }
      window.CLOUDBRIDGE_CONFIG = {
        serverUrl: wsProto + '//' + host + ':' + signalPort + '/signal',
        relayUrl: host + ':10988',
        httpUrl: httpProto + '//' + host + ':' + signalPort
      };
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
